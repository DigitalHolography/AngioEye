name: Ruff Lint Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - dev

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Ruff
        run: |
          pip install ruff

      - name: Check Linting (Ruff)
        run: ruff check .

      - name: Check Formatting (Ruff Format)
        run: ruff format --check .
